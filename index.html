<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Digital Saya</title>
    <link rel="stylesheet" href="style.css">
    <!-- Menggunakan Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="profile-card">
        <div class="profile-header">
            <img src="https://via.placeholder.com/120" alt="Foto Profil" class="profile-img">
            <h1>ZAHRA NISSA</h1>
            <p>Web Developer & Creative Designer</p>
        </div>

        <div class="links-container">
            <!-- Link WhatsApp -->
            <a href="https://wa.me/628123456789" target="_blank" class="link-item whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>

            <!-- Link Instagram -->
            <a href="https://instagram.com/username anda" target="_blank" class="link-item instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <!-- Link LinkedIn -->
            <a href="https://linkedin.com/in/username" target="_blank" class="link-item linkedin">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>

            <!-- Link Website/Portfolio -->
            <a href="#" target="_blank" class="link-item website">
                <i class="fas fa-globe"></i> Portofolio
            </a>
        </div>

        <button id="shareBtn" class="share-button">
            <i class="fas fa-share-alt"></i> Bagikan Profil
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
